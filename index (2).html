<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Prediction Demo</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

h1 {
  font-size: 50px;
}

.timer {
  font-size: 30px;
  margin-top: 10px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.violet { color: #a855f7; }

.history {
  margin-top: 20px;
}

.item {
  display: inline-block;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  background: #0f172a;
}
</style>

</head>
<body>

<div class="container">
  <h2>Color Prediction Demo</h2>

  <div class="box">
    <p>Period</p>
    <h3 id="period">100001</h3>

    <h1 id="number">-</h1>
    <div id="colorText"></div>

    <div class="timer" id="timer">60</div>
  </div>

  <div class="history">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>
let time = 60;
let period = 100001;
let history = [];

function getColor(num){
  if(num == 0 || num == 5) return "violet";
  if(num % 2 == 0) return "red";
  return "green";
}

function generateResult(){
  let num = Math.floor(Math.random() * 10);
  let color = getColor(num);

  document.getElementById("number").innerText = num;
  document.getElementById("number").className = color;

  document.getElementById("colorText").innerHTML = 
    `<span class="${color}">${color.toUpperCase()}</span>`;

  history.unshift({num, color});
  history = history.slice(0,10);

  updateHistory();

  period++;
  document.getElementById("period").innerText = period;
}

function updateHistory(){
  let html = "";
  history.forEach(h=>{
    html += `<div class="item ${h.color}">${h.num}</div>`;
  });
  document.getElementById("history").innerHTML = html;
}

setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = time;

  if(time === 0){
    generateResult();
    time = 60;
  }
},1000);

</script>

</body>
</html>
